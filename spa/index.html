<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VenueDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/theme.css">
    <link rel="stylesheet" href="css/shared.css">
    <style>
        /* Page-specific styles injected by router */
        #page-style {}
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside id="sidebar">
        <div class="brand">
            <span>
                <i class="fa-solid fa-layer-group"></i>
                <span class="brand-text">VenueDesk</span>
            </span>
            <div style="display:flex;align-items:center;gap:4px;">
                <button class="sidebar-collapse-btn" id="collapse-btn" onclick="window.UI.toggleSidebarCollapse()" title="Collapse sidebar" aria-label="Toggle sidebar">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button class="close-sidebar" onclick="window.UI.closeSidebar()" aria-label="Close sidebar">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
        </div>
        <nav class="nav-section" id="sidebar-nav">
            <a class="nav-link" data-route="#/" data-label="Dashboard" onclick="navigate('#/')">
                <i class="fa-solid fa-chart-pie"></i><span class="nav-label"> Dashboard</span>
            </a>
            <a class="nav-link" data-route="#/bookings" data-label="Bookings" onclick="navigate('#/bookings')">
                <i class="fa-solid fa-calendar-days"></i><span class="nav-label"> Bookings</span>
            </a>
            <a class="nav-link" data-route="#/calendar" data-label="Calendar" onclick="navigate('#/calendar')">
                <i class="fa-solid fa-calendar-alt"></i><span class="nav-label"> Calendar</span>
            </a>
            <a class="nav-link" data-route="#/customers" data-label="Customers" onclick="navigate('#/customers')">
                <i class="fa-solid fa-users"></i><span class="nav-label"> Customers</span>
            </a>
            <a class="nav-link" data-route="#/manual-booking" data-label="Walk-In Booking" onclick="navigate('#/manual-booking')">
                <i class="fa-solid fa-person-walking-arrow-right"></i><span class="nav-label"> Walk-In Booking</span>
            </a>
            <a class="nav-link" data-route="#/venuepro-booking" data-label="New Booking" onclick="navigate('#/venuepro-booking')">
                <i class="fa-solid fa-building"></i><span class="nav-label"> New Booking</span>
            </a>
            <a class="nav-link" data-route="#/final-payment" data-label="Payments" onclick="navigate('#/final-payment')">
                <i class="fa-solid fa-check-double"></i><span class="nav-label"> Payments</span>
            </a>
            <a class="nav-link" data-route="#/accounts" data-label="Accounts" onclick="navigate('#/accounts')">
                <i class="fa-solid fa-file-invoice-dollar"></i><span class="nav-label"> Accounts</span>
            </a>
            <a class="nav-link" data-route="#/audit-log" data-label="Audit Log" onclick="navigate('#/audit-log')">
                <i class="fa-solid fa-clock-rotate-left"></i><span class="nav-label"> Audit Log</span>
            </a>
            <a class="nav-link" data-route="#/users" data-label="Users" onclick="navigate('#/users')">
                <i class="fa-solid fa-user-shield"></i><span class="nav-label"> Users</span>
            </a>
            <a class="nav-link" data-route="#/admin-config" data-label="Admin Config" onclick="navigate('#/admin-config')">
                <i class="fa-solid fa-sliders"></i><span class="nav-label"> Admin Config</span>
            </a>
            <a class="nav-link" data-route="#/leadgen" data-label="Lead Gen" onclick="navigate('#/leadgen')">
                <i class="fa-solid fa-robot"></i><span class="nav-label"> Lead Gen</span>
            </a>
            <a class="nav-link nav-logout" data-label="Logout" onclick="window.Auth.logout()">
                <i class="fa-solid fa-right-from-bracket"></i><span class="nav-label"> Logout</span>
            </a>
        </nav>
    </aside>

    <!-- Mobile backdrop -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="window.UI.closeSidebar()"></div>

    <!-- Main -->
    <div id="main-content">
        <header id="app-header">
            <div class="header-left">
                <button class="menu-toggle" onclick="window.UI.toggleSidebar()" aria-label="Toggle menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 id="page-title">Dashboard</h1>
            </div>
            <div class="header-right">
                <div class="live-clock" id="live-clock">
                    <i class="fa-solid fa-clock"></i>
                    <span id="clock-time">--:--:--</span>
                </div>
                <button class="theme-toggle" id="theme-btn" onclick="window.UI.toggleTheme()" title="Toggle theme" aria-label="Toggle light/dark theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
        </header>
        <div id="page-content">
            <div class="loading"><i class="fa-solid fa-circle-notch fa-spin"></i><p>Loading...</p></div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toast-container" aria-live="polite"></div>

    <!-- Page-specific styles (injected by router) -->
    <style id="page-style"></style>

    <script type="module" src="js/app.js"></script>
</body>
</html>
