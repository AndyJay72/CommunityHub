<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign In | VenueDesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh; display: flex;
            align-items: center; justify-content: center;
            background-color: #06101f;
            background-image:
                radial-gradient(ellipse 80% 60% at 25% -5%, rgba(99,102,241,0.22) 0%, transparent 55%),
                radial-gradient(ellipse 60% 55% at 75% 105%, rgba(6,182,212,0.13) 0%, transparent 55%);
            padding: 1rem;
        }
        .login-wrap {
            background: rgba(10,17,38,0.82);
            backdrop-filter: blur(28px);
            border: 1px solid rgba(99,120,186,0.22);
            border-radius: 24px;
            padding: 3rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.6);
            text-align: center;
        }
        .brand {
            display: inline-flex; align-items: center; gap: 10px;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #eef2ff 0%, #a5b4fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 2rem; font-weight: 800; letter-spacing: -0.02em;
        }
        .brand i { -webkit-text-fill-color: #6366f1; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; color: #94a3b8; font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
        input {
            width: 100%; padding: 14px 16px;
            background: rgba(0,0,0,0.38); border: 1px solid rgba(99,120,186,0.22);
            border-radius: 12px; color: #e2e8f0;
            font-family: inherit; font-size: 1rem; outline: none;
            transition: all 0.2s; min-height: 44px;
        }
        input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.18); }
        .btn-login {
            width: 100%; padding: 16px; margin-top: 0.5rem;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none; border-radius: 12px;
            color: white; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.22s;
            font-family: inherit; min-height: 44px;
        }
        .btn-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(99,102,241,0.4); }
        .btn-login:disabled { opacity: 0.6; cursor: wait; transform: none; }
        .error-msg {
            margin-top: 1rem; padding: 10px 14px; border-radius: 8px;
            background: rgba(239,68,68,0.1); color: #f87171;
            font-size: 0.9rem; display: none;
        }
        @media (max-width: 480px) { .login-wrap { padding: 2rem 1.5rem; } .brand { font-size: 1.6rem; } }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="brand"><i class="fa-solid fa-layer-group"></i> VenueDesk</div>
        <form id="loginForm" onsubmit="return false;">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="loginBtn" onclick="login()">Sign In</button>
            <div class="error-msg" id="errorBox"></div>
        </form>
    </div>
    <script>
        const LOGIN_API = 'https://n8n.srv1090894.hstgr.cloud/webhook/login';
        if (localStorage.getItem('vp_token')) window.location.href = 'index.html';

        async function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const btn  = document.getElementById('loginBtn');
            const err  = document.getElementById('errorBox');
            if (!user || !pass) { showErr('Please enter your username and password.'); return; }
            btn.disabled = true; btn.textContent = 'Verifying…'; err.style.display = 'none';
            try {
                const res  = await fetch(LOGIN_API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ username:user, password:pass }) });
                const data = await res.json();
                if (data.token) {
                    const tid = data.user?.tenant_id || '';
                    localStorage.setItem('vp_token',      data.token);
                    localStorage.setItem('vp_user',       JSON.stringify(data.user));
                    localStorage.setItem('vp_tenant_id',  tid);
                    localStorage.setItem('vp_venue_id',   tid);
                    localStorage.setItem('vp_venue_name', data.user?.venue_name || data.user?.name || '');
                    window.location.href = 'index.html';
                } else { throw new Error(data.message || 'Login failed'); }
            } catch(e) {
                showErr('Invalid username or password.');
                btn.disabled = false; btn.textContent = 'Sign In';
            }
        }
        function showErr(msg) {
            const err = document.getElementById('errorBox');
            err.textContent = msg; err.style.display = 'block';
        }
        document.getElementById('loginForm').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    </script>
</body>
</html>
